<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CULT CURATE - Discover the Most Innovative & Exciting Products 2026</title>
    <meta name="description" content="Explore the most innovative and exciting products from top D2C brands in India. Discover emerging direct-to-consumer brands across beauty, fashion, food, tech, and lifestyle with AI-powered curation." />
    <meta name="keywords" content="new D2C brands 2026, top D2C brands India, sustainable D2C products, innovative products 2026, emerging brands, direct to consumer brands India, eco-friendly D2C brands, clean beauty 2026, sustainable fashion, trending D2C products, new product launches 2026" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- TraceFlow Analytics -->
<script>
(function(){
  var TF_PROJECT="10523227165cfa9fa49a9421";
  var TF_KEY="fe2ef4ffd362e15194f8469d4aa88bed";
  var TF_ENDPOINT="http://localhost:8000/api/track";
  var sid=localStorage.getItem("tf_sid");
  var aid=localStorage.getItem("tf_aid");
  if(!sid||Date.now()-parseInt(localStorage.getItem("tf_ts")||"0")>1800000){
    sid=Math.random().toString(36).substr(2,12)+Date.now().toString(36);
    localStorage.setItem("tf_sid",sid);
  }
  localStorage.setItem("tf_ts",Date.now().toString());
  if(!aid){aid=Math.random().toString(36).substr(2,16);localStorage.setItem("tf_aid",aid);}
  var u=new URLSearchParams(window.location.search);
  var d={
    project_id:TF_PROJECT,
    page_url:window.location.href,
    referrer:document.referrer||"",
    utm_source:u.get("utm_source")||"",
    utm_medium:u.get("utm_medium")||"",
    utm_campaign:u.get("utm_campaign")||"",
    utm_content:u.get("utm_content")||"",
    utm_term:u.get("utm_term")||"",
    user_agent:navigator.userAgent,
    device_type:window.innerWidth<768?"mobile":window.innerWidth<1024?"tablet":"desktop",
    session_id:sid,
    anonymous_id:aid,
    timestamp:new Date().toISOString(),
    screen_width:screen.width,
    screen_height:screen.height
  };
  function send(data,retries){
    retries=retries||0;
    fetch(TF_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data),
      keepalive:true
    }).catch(function(){
      if(retries<3)setTimeout(function(){send(data,retries+1);},1000*(retries+1));
    });
  }
  send(d);
  window.tfTrack=function(type,val,meta){
    fetch("http://localhost:8000/api/conversion",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({project_id:TF_PROJECT,session_id:sid,event_type:type||"purchase",value:val||0,metadata:meta||{}})
    });
  };
})();
</script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
